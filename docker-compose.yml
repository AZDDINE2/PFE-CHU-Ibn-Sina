services:
  backend:
    build: ./backend
    container_name: chu_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - DATA_ROOT=/app
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-480}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/chu.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: chu_frontend
    ports:
      - "3000:80"
    restart: unless-stopped
